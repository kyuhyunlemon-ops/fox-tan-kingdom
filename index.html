<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>光榮獵犬養成計劃</title>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont;
      background: linear-gradient(135deg, #eaf2ff, #f8fbff);
      text-align: center;
      margin: 0;
    }

    h2 {
      margin-top: 30px;
    }

    .subtitle {
      color: gray;
      margin-top: -10px;
      font-size: 14px;
    }

    .card {
      background: white;
      padding: 20px;
      margin: 20px auto;
      width: 320px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    }

    .task, .reward {
      text-align: left;
      margin: 12px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    button {
      border: none;
      background: #6ea8fe;
      color: white;
      border-radius: 10px;
      padding: 5px 10px;
      cursor: pointer;
    }

    input[type="checkbox"] {
      transform: scale(1.2);
      margin-right: 8px;
    }

    .level {
      font-weight: bold;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h2>🐶 光榮獵犬養成計劃</h2>
<p class="subtitle">Glorious Hound Training System</p>

<div class="card">
  <h3>目前金幣：<span id="points">0</span></h3>
  <div class="level">等級：<span id="level">幼犬</span></div>
</div>

<!-- 任務 -->
<div class="card">
  <h4>今日任務</h4>

  <div class="task">
    <label>
      <input type="checkbox" onchange="toggleTask(this, 't1', 10)">
      洗衣服（+10）
    </label>
  </div>

  <div class="task">
    <label>
      <input type="checkbox" onchange="toggleTask(this, 't2', 10)">
      整理床（+10）
    </label>
  </div>

  <div class="task">
    <label>
      <input type="checkbox" onchange="toggleTask(this, 't3', 30)">
      倒垃圾（+30）
    </label>
  </div>

</div>

<!-- 兌換 -->
<div class="card">
  <h4>兌換中心</h4>

  <div class="reward">
    休息一天（100）
    <button onclick="redeem(100)">兌換</button>
  </div>

  <div class="reward">
    買東西（200）
    <button onclick="redeem(200)">兌換</button>
  </div>

  <div class="reward">
    現金50元（500）
    <button onclick="redeem(500)">兌換</button>
  </div>

</div>

<script>
  let points = localStorage.getItem("points")
    ? parseInt(localStorage.getItem("points"))
    : 0;

  function getLevel(p) {
    if (p >= 200) return "王犬 🐺";
    if (p >= 100) return "獵犬 🐕";
    return "幼犬 🐶";
  }

  function toggleTask(checkbox, id, value) {
    let completed = JSON.parse(localStorage.getItem("tasks") || "{}");

    if (checkbox.checked) {
      points += value;
      completed[id] = true;
    } else {
      points -= value;
      delete completed[id];
    }

    localStorage.setItem("tasks", JSON.stringify(completed));
    update();
  }

  function redeem(cost) {
    if (points >= cost) {
      points -= cost;
      alert("兌換成功！");
    } else {
      alert("金幣不夠！");
    }
    update();
  }

  function update() {
    document.getElementById("points").innerText = points;
    document.getElementById("level").innerText = getLevel(points);
    localStorage.setItem("points", points);
  }

  function loadTasks() {
    let completed = JSON.parse(localStorage.getItem("tasks") || "{}");

    document.querySelectorAll("input[type=checkbox]").forEach((cb, index) => {
      let id = "t" + (index + 1);
      if (completed[id]) {
        cb.checked = true;
      }
    });
  }

  update();
  loadTasks();
</script>

</body>
</html>
