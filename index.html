<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>光榮獵犬養成計劃</title>

<style>
body {
  font-family: -apple-system;
  background: linear-gradient(135deg,#eaf2ff,#f8fbff);
  text-align:center;
}

.card {
  background:white;
  padding:20px;
  margin:20px auto;
  width:360px;
  border-radius:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
  position:relative;
}

.task { text-align:left; margin:8px 0; }

button {
  background:#6ea8fe;
  color:white;
  border:none;
  border-radius:8px;
  padding:6px 12px;
}

/* 小按鈕 */
.small-btn {
  position:absolute;
  right:15px;
  top:15px;
  font-size:11px;
  padding:4px 8px;
  background:#ccc;
  color:#333;
}

/* XP */
.xp-bar { height:10px;background:#eee;border-radius:10px;overflow:hidden; }
.xp-fill { height:100%;background:#6ea8fe; }

/* 日曆 */
.calendar {
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:5px;
}
.day { padding:8px;border-radius:8px;background:#eee; }

.checked {
  background: linear-gradient(135deg,#f5c542,#ffd86b);
  color:#5a4500;
}
.today { border:2px solid #f5c542; }

/* 兌換 */
.reward {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin:12px 0;
}

/* log */
.log {
  font-size:12px;
  text-align:left;
  max-height:180px;
  overflow-y:auto;
}
.log div {
  padding:6px 4px;
  border-bottom:1px solid #eee;
}
.plus { color:#2e7d32; }
.minus { color:#c62828; }
.time { color:#888;font-size:11px; }

/* 皇冠 */
@keyframes glow {
  50%{transform:scale(1.3);text-shadow:0 0 20px gold;}
}
.crown-animate { animation:glow 0.8s; }

/* toast */
.toast {
  position:fixed;
  bottom:30px;
  left:50%;
  transform:translateX(-50%);
  background:#333;
  color:white;
  padding:10px 20px;
  border-radius:20px;
  opacity:0;
}
.toast.show { opacity:1; }
</style>
</head>

<body>

<h2>🐶 光榮獵犬養成計劃</h2>

<!-- 金幣 -->
<div class="card">
金幣：<span id="points">0</span>
<div class="xp-bar"><div id="xp" class="xp-fill"></div></div>

<br>
<button onclick="resetPoints()">重置積分</button>
</div>

<!-- 日曆 -->
<div class="card">
<h4>簽到日曆</h4>
<div id="calendar" class="calendar"></div>
<br>
<button onclick="checkin()">今日簽到</button>
<div id="crown"></div>
</div>

<!-- 任務（完全保留） -->
<div class="card">
<h4>任務</h4>

<div class="task"><input type="checkbox" onchange="task(this,'wash',30,'洗碗')"> 洗碗 +30</div>
<div class="task"><input type="checkbox" onchange="task(this,'laundry',10,'洗衣服')"> 洗衣服 +10</div>
<div class="task"><input type="checkbox" onchange="task(this,'water',10,'澆花')"> 澆花 +10</div>
<div class="task"><input type="checkbox" onchange="task(this,'frenchSpeak',40,'大聲唸法文')"> 大聲唸法文 +40</div>
<div class="task"><input type="checkbox" onchange="task(this,'frenchWrite',40,'法文聽寫')"> 法文聽寫 +40</div>
<div class="task"><input type="checkbox" onchange="task(this,'callFamily',50,'打電話給家人')"> 打電話給家人 +50</div>
<div class="task"><input type="checkbox" onchange="task(this,'giftFamily',100,'買禮物給家人')"> 買禮物給家人 +100</div>

<br>
<button onclick="resetTasks()">重置任務</button>
</div>

<!-- 成就 -->
<div class="card">
<h4>🏆 成就</h4>
<div id="achievements"></div>
</div>

<!-- 兌換 -->
<div class="card">
<h4>兌換</h4>

<div class="reward">
  <span>休息（100）</span>
  <button onclick="redeem(100)">兌換</button>
</div>

<div class="reward">
  <span>開心買買（100）</span>
  <button onclick="redeem(100)">兌換</button>
</div>

</div>

<!-- 明細 -->
<div class="card">
<h4>積分明細</h4>
<button class="small-btn" onclick="resetLogs()">清空</button>
<div id="log" class="log"></div>
</div>

<div id="toast" class="toast"></div>

<script>
let points=parseInt(localStorage.getItem("points")||0);
let logs=JSON.parse(localStorage.getItem("logs")||"[]");
let count=JSON.parse(localStorage.getItem("count")||"{}");

function toast(msg){
  let t=document.getElementById("toast");
  t.innerText=msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),1500);
}

function getToday(){
  return new Date().toISOString().split("T")[0];
}

/* 任務 */
function task(cb,id,val,name){
  let tasks=JSON.parse(localStorage.getItem("tasks")||"{}");

  if(cb.checked && !tasks[id]){
    points+=val;
    tasks[id]=true;

    count[id]=(count[id]||0)+1;
    localStorage.setItem("count",JSON.stringify(count));

    addLog(name+" +"+val);
  }

  if(!cb.checked) delete tasks[id];

  localStorage.setItem("tasks",JSON.stringify(tasks));
  update();
}

/* 成就 */
function renderAchievements(){
  let wash=count["wash"]||0;
  let show=Math.min(wash,7);

  document.getElementById("achievements").innerHTML=
    `洗碗 7次 (${show}/7) ${wash>=7?"🏆":""}`;
}

/* 日曆 */
function renderCalendar(){
  let data=JSON.parse(localStorage.getItem("check")||"[]");
  let now=new Date();
  let y=now.getFullYear(),m=now.getMonth();
  let last=new Date(y,m+1,0).getDate();
  let today=now.getDate();

  let html="";
  for(let i=1;i<=last;i++){
    let mm=String(m+1).padStart(2,'0');
    let dd=String(i).padStart(2,'0');
    let d=`${y}-${mm}-${dd}`;

    let cls="day";
    if(i===today) cls+=" today";
    if(data.includes(d)) cls+=" checked";

    html+=`<div class="${cls}">${i}</div>`;
  }
  document.getElementById("calendar").innerHTML=html;
}

/* 簽到 */
function checkin(){
  let today=getToday();
  let data=JSON.parse(localStorage.getItem("check")||"[]");

  if(data.includes(today)){
    toast("今天簽過了");
    return;
  }

  data.push(today);
  localStorage.setItem("check",JSON.stringify(data));

  streak();
  renderCalendar();
}

/* 連續 */
function streak(){
  let data=JSON.parse(localStorage.getItem("check")||"[]").sort();
  let s=1;

  for(let i=data.length-1;i>0;i--){
    let d1=new Date(data[i]),d2=new Date(data[i-1]);
    if((d1-d2)/86400000===1) s++;
    else break;
  }

  let c=document.getElementById("crown");

  if(s>=7){
    c.innerText="👑完成！";
    c.classList.remove("crown-animate");
    void c.offsetWidth;
    c.classList.add("crown-animate");
  }else{
    c.innerText="目前連續 "+s+" 天";
  }
}

/* 兌換 */
function redeem(cost){
  if(points>=cost){
    points-=cost;
    addLog("兌換 -"+cost);
    toast("成功🎉");
  }else{
    toast("現在還不能換唷～");
  }
  update();
}

/* ⭐⭐⭐ 唯一修改：24小時制 */
function addLog(text){
  let now=new Date();

  let time = now.toLocaleDateString('zh-TW',{month:'2-digit',day:'2-digit'})+" "+
             now.toLocaleTimeString('zh-TW',{
               hour:'2-digit',
               minute:'2-digit',
               hour12:false   // ⭐ 重點
             });

  logs.unshift(time+"｜"+text);
}

/* 清空明細 */
function resetLogs(){
  if(confirm("清空明細？")){
    logs=[];
    localStorage.setItem("logs",JSON.stringify(logs));
    update();
  }
}

function resetTasks(){
  localStorage.setItem("tasks","{}");
  document.querySelectorAll("input").forEach(c=>c.checked=false);
}

function resetPoints(){
  if(confirm("只重置金幣？")){
    points=0;
    localStorage.setItem("points",0);
    update();
  }
}

/* update */
function update(){
  document.getElementById("points").innerText=points;
  localStorage.setItem("points",points);
  localStorage.setItem("logs",JSON.stringify(logs));

  document.getElementById("xp").style.width=(points%10000/10000*100)+"%";

  document.getElementById("log").innerHTML=
  logs.map(l=>{
    let minus=l.includes("兌換");
    let cls=minus?"minus":"plus";
    let p=l.split("｜");
    return `<div><span class="time">${p[0]}</span><br><span class="${cls}">${p[1]}</span></div>`;
  }).join("");

  renderAchievements();
}

/* init */
renderCalendar();
streak();
update();
</script>

</body>
</html>
