<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>光榮獵犬養成計劃</title>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont;
      background: linear-gradient(135deg, #eaf2ff, #f8fbff);
      text-align: center;
      margin: 0;
    }

    h2 { margin-top: 30px; }

    .subtitle {
      color: gray;
      margin-top: -10px;
      font-size: 14px;
    }

    .card {
      background: white;
      padding: 20px;
      margin: 20px auto;
      width: 320px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    }

    .task, .reward {
      text-align: left;
      margin: 12px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    button {
      border: none;
      background: #6ea8fe;
      color: white;
      border-radius: 10px;
      padding: 6px 12px;
      cursor: pointer;
    }

    .danger {
      background: #ff6b6b;
    }

    input[type="checkbox"] {
      transform: scale(1.2);
      margin-right: 8px;
    }

    .level {
      font-weight: bold;
      margin-top: 10px;
    }

    .xp-bar {
      width: 100%;
      height: 10px;
      background: #eee;
      border-radius: 10px;
      margin-top: 10px;
      overflow: hidden;
    }

    .xp-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #6ea8fe, #a5c8ff);
      transition: width 0.3s;
    }
  </style>
</head>

<body>

<h2>🐶 光榮獵犬養成計劃</h2>
<p class="subtitle">Glorious Hound Training System</p>

<div class="card">
  <h3>目前金幣：<span id="points">0</span></h3>
  <div class="level">等級：<span id="level">幼犬</span></div>

  <div class="xp-bar">
    <div class="xp-fill" id="xp"></div>
  </div>

  <br>
  <button class="danger" onclick="resetAll()">重置全部</button>
</div>

<!-- 任務 -->
<div class="card">
  <h4>今日任務</h4>

  <div class="task"><label><input type="checkbox" onchange="toggleTask(this,'t1',10)"> 洗碗（+10）</label></div>
  <div class="task"><label><input type="checkbox" onchange="toggleTask(this,'t2',10)"> 洗衣服（+10）</label></div>
  <div class="task"><label><input type="checkbox" onchange="toggleTask(this,'t3',10)"> 澆花（+10）</label></div>
  <div class="task"><label><input type="checkbox" onchange="toggleTask(this,'t4',20)"> 大聲唸法文（+20）</label></div>
  <div class="task"><label><input type="checkbox" onchange="toggleTask(this,'t5',20)"> 法文聽寫（+20）</label></div>
  <div class="task"><label><input type="checkbox" onchange="toggleTask(this,'t6',50)"> 打電話給家人（+50）</label></div>
  <div class="task"><label><input type="checkbox" onchange="toggleTask(this,'t7',100)"> 買禮物給家人（+100）</label></div>

</div>

<!-- 兌換 -->
<div class="card">
  <h4>兌換中心</h4>

  <div class="reward">休息一天（100） <button onclick="redeem(100)">兌換</button></div>
  <div class="reward">買東西（200） <button onclick="redeem(200)">兌換</button></div>
  <div class="reward">現金50元（500） <button onclick="redeem(500)">兌換</button></div>

</div>

<script>
  let points = localStorage.getItem("points")
    ? parseInt(localStorage.getItem("points"))
    : 0;

  function getLevel(p) {
    if (p >= 10000) return "王犬 🐺";
    if (p >= 5000) return "獵犬 🐕";
    return "幼犬 🐶";
  }

  function getXPPercent(p) {
    if (p < 100) return (p / 100) * 100;
    if (p < 200) return ((p - 100) / 100) * 100;
    return 100;
  }

  function getToday() {
    return new Date().toISOString().split("T")[0];
  }

  function checkReset() {
    let lastDate = localStorage.getItem("lastDate");
    let today = getToday();

    if (lastDate !== today) {
      localStorage.setItem("tasks", JSON.stringify({}));
      localStorage.setItem("lastDate", today);
    }
  }

  function toggleTask(checkbox, id, value) {
    let completed = JSON.parse(localStorage.getItem("tasks") || "{}");

    if (checkbox.checked) {
      if (!completed[id]) {
        points += value;
        completed[id] = true;
      }
    } else {
      delete completed[id];
    }

    localStorage.setItem("tasks", JSON.stringify(completed));
    update();
  }

  function redeem(cost) {
    if (points >= cost) {
      points -= cost;
      alert("兌換成功！");
    } else {
      alert("金幣不夠！");
    }
    update();
  }

  function resetAll() {
    if (confirm("確定要全部重置嗎？")) {
      localStorage.clear();
      location.reload();
    }
  }

  function update() {
    document.getElementById("points").innerText = points;
    document.getElementById("level").innerText = getLevel(points);

    let percent = getXPPercent(points);
    document.getElementById("xp").style.width = percent + "%";

    localStorage.setItem("points", points);
  }

  function loadTasks() {
    let completed = JSON.parse(localStorage.getItem("tasks") || "{}");

    document.querySelectorAll("input[type=checkbox]").forEach((cb, index) => {
      let id = "t" + (index + 1);
      if (completed[id]) {
        cb.checked = true;
      }
    });
  }

  checkReset();
  update();
  loadTasks();
</script>

</body>
</html>
